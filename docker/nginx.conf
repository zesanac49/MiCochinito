worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Uvicorn (backend) escucha solo en localhost dentro del contenedor.
    upstream backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 8080;
        server_name _;

        # Cabeceras de seguridad básicas (XSS / clickjacking / sniffing).
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        root /var/www/html;
        index index.html;

        # --- API + Swagger (/api/v1, /api/v1/docs) → uvicorn ---
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Health del backend (útil para chequeos en la LAN) ---
        location = /health {
            proxy_pass http://backend/health;
        }

        # --- SPA (React): todo lo demás cae en index.html ---
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
